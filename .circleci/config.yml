            branches:
              only:
                - master
          requires:
            - publish_snapshots_play27_scala212_scala213

      - publish_snapshots_play29_scala213:
          filters:
            branches:
              only:
                - master
          requires:
            - publish_snapshots_play28_scala212_scala213

      - publish_snapshots_play30_scala213_scala3:
          filters:
            branches:
              only:
                - master
          requires:
            - publish_snapshots_play29_scala213

      - trigger_dependent_builds:
          filters:
            branches:
              only:
                - master
          requires:
            - publish_snapshots_play30_scala213_scala3
