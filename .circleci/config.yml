  trigger_dependent_builds:
    docker:
      - image: cimg/base:2020.01

    working_directory: ~/repo

    steps:
      - run:
          name: Trigger build @ Reactivemongo-Scalafix
          command: |
                    curl -X POST "https://circleci.com/api/v1.1/project/github/ReactiveMongo/ReactiveMongo-Scalafix/build?circle-token=${REACTIVEMONGO_SCALAFIX_API_TOKEN}"
workflows:
  version: 2

  main_suite:
    jobs:
      - jdk26_scala212_play26
      - jdk17_scala213_play27
      - jdk26_scala213_play28
      - jdk17_scala213_play29
      - jdk26_scala213_play30
      - jdk17_scala3_play30

      - publish_snapshots_play25_scala211:
          filters:
            branches:
              only:
                - master
          requires:
            - jdk26_scala212_play26
            - jdk17_scala213_play27
            - jdk26_scala213_play28
            - jdk17_scala213_play29
            - jdk17_scala3_play30
            - jdk26_scala213_play30

      - publish_snapshots_play26_scala211_scala212:
